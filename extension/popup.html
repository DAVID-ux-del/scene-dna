<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<style>
  body { width: 300px; margin: 0; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #222; }
  .wrap { padding: 14px 16px 16px; }
  h1 { font-size: 14px; margin: 0 0 10px; }
  label { display: block; font-weight: 600; margin: 10px 0 5px; font-size: 12px; }
  .field { position: relative; }
  input { width: 100%; padding: 8px 34px 8px 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 13px; }
  .toggle { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 13px; color: #888; padding: 4px; }
  button.save { width: 100%; margin-top: 12px; padding: 9px; background: #0f766e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 13px; }
  .status { text-align: center; font-size: 12px; margin-top: 8px; min-height: 16px; }
  .ok { color: #2a9d4a; }
  .err { color: #d33; }
  .hint { color: #888; font-size: 11px; margin-top: 6px; }
  .more { display: block; text-align: center; margin-top: 10px; font-size: 12px; color: #0f766e; cursor: pointer; text-decoration: none; }
  a { color: #0f766e; }
</style>
</head>
<body>
  <div class="wrap">
    <h1>SceneDNA · 设置</h1>
    <label for="apiKey">API Key</label>
    <div class="field">
      <input id="apiKey" type="password" placeholder="sk-..." autocomplete="off" />
      <button class="toggle" id="toggle" type="button" title="显示 API Key" aria-label="显示 API Key" aria-pressed="false">👁</button>
    </div>
    <div class="hint">支持 <a href="https://aihubmix.com" target="_blank">AiHubMix</a> 或任意 OpenAI 兼容网关。仅存本地。</div>
    <button class="save" id="save">保存</button>
    <div class="status" id="status" role="status" aria-live="polite"></div>
    <a class="more" id="more">高级设置（模型 / API 地址）→</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
